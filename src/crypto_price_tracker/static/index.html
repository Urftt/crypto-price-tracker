<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Prices — EUR</title>
  <style>
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
    h1 { color: #58a6ff; margin-bottom: 4px; }
    .subtitle { color: #6e7681; font-size: 0.85em; margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; max-width: 800px; }
    th { color: #8b949e; text-align: right; padding: 6px 12px; border-bottom: 1px solid #21262d; font-size: 0.8em; text-transform: uppercase; }
    th:first-child, td:first-child { text-align: left; }
    td { padding: 8px 12px; border-bottom: 1px solid #161b22; text-align: right; }
    tr:hover td { background: #161b22; }
    tr.clickable { cursor: pointer; }
    .symbol { color: #58a6ff; font-weight: bold; }
    .name { color: #8b949e; font-size: 0.9em; }
    .up { color: #3fb950; }
    .down { color: #f85149; }
    .updated { color: #6e7681; font-size: 0.75em; margin-top: 16px; }

    #refresh-btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 10px;
      font-family: monospace;
      font-size: 0.85em;
      cursor: pointer;
      margin-left: 8px;
      vertical-align: middle;
    }
    #refresh-btn:hover {
      background: #30363d;
      border-color: #58a6ff;
      color: #58a6ff;
    }
    #countdown {
      color: #58a6ff;
      font-weight: bold;
    }

    /* Modal backdrop */
    #modal-backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    /* Modal card */
    #modal-card {
      background: #161b22;
      border-radius: 8px;
      padding: 24px;
      max-width: 600px;
      width: calc(100% - 48px);
      position: relative;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    #modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #8b949e;
      font-size: 1.4em;
      cursor: pointer;
      font-family: monospace;
      padding: 0;
      line-height: 1;
    }
    #modal-close:hover { color: #c9d1d9; }

    #modal-header { margin-bottom: 16px; }
    #modal-symbol { font-size: 1.8em; font-weight: bold; color: #58a6ff; display: block; }
    #modal-name { color: #8b949e; font-size: 0.9em; }

    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #21262d; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #8b949e; font-size: 0.85em; }
    .detail-value { font-weight: bold; text-align: right; }

    #modal-error { color: #f85149; padding: 16px 0; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab-btn {
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 4px 4px 0 0;
      padding: 6px 16px;
      font-family: monospace;
      font-size: 0.9em;
      cursor: pointer;
    }
    .tab-btn:hover { color: #c9d1d9; border-color: #58a6ff; }
    .tab-btn.active { background: #0d1117; color: #58a6ff; border-bottom-color: #0d1117; font-weight: bold; }

    /* Portfolio form */
    .portfolio-form {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding: 12px;
      background: #161b22;
      border-radius: 6px;
      border: 1px solid #21262d;
    }
    .portfolio-form label {
      display: flex;
      flex-direction: column;
      font-size: 0.75em;
      color: #8b949e;
      text-transform: uppercase;
    }
    .portfolio-form input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      font-family: monospace;
      font-size: 0.9em;
      padding: 4px 8px;
      margin-top: 2px;
      width: 100px;
    }
    .portfolio-form input:focus { border-color: #58a6ff; outline: none; }
    .portfolio-form button {
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 4px;
      padding: 5px 14px;
      font-family: monospace;
      font-size: 0.9em;
      cursor: pointer;
    }
    .portfolio-form button:hover { background: #2ea043; }

    /* Form messages */
    .form-msg { font-size: 0.8em; margin-bottom: 8px; min-height: 1.2em; }
    .form-msg.ok { color: #3fb950; }
    .form-msg.err { color: #f85149; }

    /* Lots toggle and actions */
    .lots-toggle {
      background: none;
      border: none;
      color: #58a6ff;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.85em;
      padding: 0;
    }
    .lots-toggle:hover { text-decoration: underline; }
    .lots-row td { background: #161b22; font-size: 0.85em; }
    .lot-actions button {
      background: none;
      border: none;
      color: #f85149;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.8em;
      padding: 0 4px;
    }
    .lot-actions button:hover { text-decoration: underline; }

    /* Summary footer */
    .summary-footer {
      margin-top: 12px;
      padding: 10px 12px;
      background: #161b22;
      border-radius: 6px;
      border: 1px solid #21262d;
      font-size: 0.9em;
      max-width: 800px;
    }

    .na { color: #8b949e; }

    /* Toast notifications */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: #161b22;
      color: #c9d1d9;
      border: 1px solid #f0883e;
      border-left: 4px solid #f0883e;
      border-radius: 4px;
      padding: 12px 16px;
      font-family: monospace;
      font-size: 0.85em;
      max-width: 350px;
      opacity: 0;
      transform: translateX(100%);
      transition: opacity 0.3s, transform 0.3s;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(0);
    }
    /* Chart period toggle buttons */
    .chart-period-btn {
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 12px;
      font-family: monospace;
      font-size: 0.85em;
      cursor: pointer;
    }
    .chart-period-btn:hover { color: #c9d1d9; border-color: #58a6ff; }
    .chart-period-btn.active { background: #0d1117; color: #58a6ff; border-color: #58a6ff; font-weight: bold; }
  </style>
  <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
</head>
<body>
  <h1>&#11041; Crypto Prices</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('prices')">Prices</button>
    <button class="tab-btn" onclick="switchTab('portfolio')">Portfolio</button>
    <button class="tab-btn" onclick="switchTab('alerts')">Alerts</button>
  </div>

  <!-- Prices tab -->
  <div id="tab-prices" class="tab-content">
    <div class="subtitle">
      Live EUR prices via Bitvavo &middot;
      next refresh in <span id="countdown">30</span>s
      <button id="refresh-btn" onclick="refreshNow()" title="Refresh now">&#8635; Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th><th>Symbol</th><th>Name</th>
          <th>Price (EUR)</th><th>24h %</th><th>Volume (EUR)</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="updated" id="updated"></div>
  </div>

  <!-- Portfolio tab -->
  <div id="tab-portfolio" class="tab-content" style="display:none;">
    <form class="portfolio-form" onsubmit="addHolding(event)">
      <label>Symbol <input type="text" id="pf-symbol" required placeholder="BTC"></label>
      <label>Amount <input type="number" id="pf-amount" required step="any" min="0.0001" placeholder="0.5"></label>
      <label>Buy Price <input type="number" id="pf-price" required step="any" min="0.01" placeholder="45000"></label>
      <label>Date <input type="date" id="pf-date"></label>
      <button type="submit">+ Add</button>
    </form>
    <div class="form-msg" id="pf-msg"></div>

    <table id="portfolio-table">
      <thead>
        <tr>
          <th>Symbol</th><th>Amount</th><th>Avg Buy</th>
          <th>Value</th><th>P&amp;L</th><th>%</th><th>Alloc</th><th></th>
        </tr>
      </thead>
      <tbody id="pf-tbody"></tbody>
    </table>

    <div class="summary-footer" id="pf-summary"></div>
  </div>

  <!-- Alerts tab -->
  <div id="tab-alerts" class="tab-content" style="display:none;">
    <form class="portfolio-form" onsubmit="addAlert(event)">
      <label>Coin
        <select id="alert-symbol" required style="background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;font-family:monospace;font-size:0.9em;padding:4px 8px;margin-top:2px;width:120px;">
          <option value="">Select...</option>
        </select>
      </label>
      <label>Target Price
        <input type="number" id="alert-price" required step="any" min="0.01" placeholder="100000">
      </label>
      <label>Direction
        <select id="alert-direction" style="background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;font-family:monospace;font-size:0.9em;padding:4px 8px;margin-top:2px;">
          <option value="above">Above</option>
          <option value="below">Below</option>
        </select>
      </label>
      <button type="submit">+ Add Alert</button>
    </form>
    <div class="form-msg" id="alert-msg"></div>

    <h3 style="color:#58a6ff;margin:16px 0 8px;font-size:0.9em;">Active Alerts</h3>
    <table>
      <thead>
        <tr><th>ID</th><th>Symbol</th><th>Target (EUR)</th><th>Direction</th><th>Created</th><th></th></tr>
      </thead>
      <tbody id="alerts-active-tbody"></tbody>
    </table>

    <h3 style="color:#8b949e;margin:16px 0 8px;font-size:0.9em;">Triggered Alerts</h3>
    <table>
      <thead>
        <tr><th>ID</th><th>Symbol</th><th>Target (EUR)</th><th>Direction</th><th>Triggered</th><th></th></tr>
      </thead>
      <tbody id="alerts-triggered-tbody"></tbody>
    </table>
    <button id="clear-triggered-btn" onclick="clearTriggered()" style="display:none;background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:4px;padding:4px 12px;font-family:monospace;font-size:0.8em;cursor:pointer;margin-top:8px;">Clear All Triggered</button>
  </div>

  <div id="toast-container"></div>

  <!-- Coin detail modal -->
  <div id="modal-backdrop" onclick="handleBackdropClick(event)">
    <div id="modal-card">
      <button id="modal-close" onclick="closeModal()" title="Close">&times;</button>
      <div id="modal-content">
        <div id="modal-header">
          <span id="modal-symbol"></span>
          <span id="modal-name"></span>
        </div>
        <div id="modal-details">
          <div class="detail-row">
            <span class="detail-label">Price (EUR)</span>
            <span class="detail-value" id="modal-price"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">24h Change</span>
            <span class="detail-value" id="modal-change"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Volume</span>
            <span class="detail-value" id="modal-volume"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Volume (EUR)</span>
            <span class="detail-value" id="modal-volume-eur"></span>
          </div>
        </div>
        <div style="margin-top:12px;text-align:center;">
          <button onclick="setAlertFromModal()" style="background:#21262d;color:#f0883e;border:1px solid #f0883e;border-radius:4px;padding:6px 16px;font-family:monospace;font-size:0.85em;cursor:pointer;">Set Alert</button>
        </div>
        <div id="chart-section" style="margin-top:16px; display:none;">
          <div style="display:flex; gap:4px; margin-bottom:8px;">
            <button class="chart-period-btn active" onclick="switchPeriod('7d')">7D</button>
            <button class="chart-period-btn" onclick="switchPeriod('30d')">30D</button>
          </div>
          <div id="chart-container" style="width:100%; height:250px;"></div>
        </div>
        <div id="modal-error" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    const fmt = (n, dec=2) => n.toLocaleString('nl-NL', {minimumFractionDigits: dec, maximumFractionDigits: dec});
    const fmtPrice = n => n >= 1 ? fmt(n) : n.toFixed(6);
    const fmtVol = n => n.toLocaleString('nl-NL', {minimumFractionDigits: 0, maximumFractionDigits: 0});

    /* --- Tab switching --- */
    function switchTab(name) {
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + name).style.display = '';
      document.querySelector(`.tab-btn[onclick="switchTab('${name}')"]`).classList.add('active');
      if (name === 'portfolio') loadPortfolio();
      if (name === 'alerts') loadAlerts();
    }

    /* --- Prices tab --- */
    async function load() {
      const raw = await fetch('/api/prices').then(r => r.json());
      const data = raw.coins;
      const triggeredAlerts = raw.triggered_alerts || [];

      // Show toast for each triggered alert
      triggeredAlerts.forEach(a => {
        showToast(`\u26a0 ${a.symbol} hit \u20ac ${fmtPrice(a.target_price)} (${a.direction} target)`);
      });

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = data.map((c, i) => `
        <tr class="clickable" onclick="showDetail('${c.symbol}')">
          <td>${i+1}</td>
          <td class="symbol">${c.symbol}</td>
          <td class="name">${c.name}</td>
          <td>&euro; ${fmtPrice(c.price)}</td>
          <td class="${c.change_24h >= 0 ? 'up' : 'down'}">${c.change_24h >= 0 ? '+' : ''}${fmt(c.change_24h)}%</td>
          <td>&euro; ${fmtVol(c.volume_eur)}</td>
        </tr>`).join('');
      document.getElementById('updated').textContent = 'Updated: ' + new Date().toLocaleTimeString('nl-NL');

      // Populate alert coin dropdown from fetched data
      populateAlertDropdown(data);
    }

    async function showDetail(symbol) {
      const backdrop = document.getElementById('modal-backdrop');
      const errorEl = document.getElementById('modal-error');
      const detailsEl = document.getElementById('modal-details');

      // Reset state and show modal
      errorEl.style.display = 'none';
      detailsEl.style.display = '';
      document.getElementById('chart-section').style.display = 'none';
      document.getElementById('modal-symbol').textContent = symbol;
      document.getElementById('modal-name').textContent = '';
      document.getElementById('modal-price').textContent = '...';
      document.getElementById('modal-change').textContent = '...';
      document.getElementById('modal-volume').textContent = '...';
      document.getElementById('modal-volume-eur').textContent = '...';
      backdrop.style.display = 'flex';

      try {
        const resp = await fetch('/api/coin/' + symbol);
        if (!resp.ok) {
          detailsEl.style.display = 'none';
          errorEl.style.display = '';
          errorEl.textContent = 'Error ' + resp.status + ': Could not load data for ' + symbol;
          return;
        }
        const c = await resp.json();

        document.getElementById('modal-symbol').textContent = c.symbol;
        document.getElementById('modal-name').textContent = c.name;
        document.getElementById('modal-price').textContent = '\u20ac ' + fmtPrice(c.price);

        const changeEl = document.getElementById('modal-change');
        changeEl.textContent = (c.change_24h >= 0 ? '+' : '') + fmt(c.change_24h) + '%';
        changeEl.className = 'detail-value ' + (c.change_24h >= 0 ? 'up' : 'down');

        document.getElementById('modal-volume').textContent = c.volume.toFixed(4);
        document.getElementById('modal-volume-eur').textContent = '\u20ac ' + fmtVol(c.volume_eur);

        // Load 7D chart (default period)
        document.querySelectorAll('.chart-period-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector('.chart-period-btn:first-child').classList.add('active');
        loadChart(symbol, '4h', 42);
      } catch (err) {
        detailsEl.style.display = 'none';
        errorEl.style.display = '';
        errorEl.textContent = 'Failed to load coin data: ' + err.message;
      }
    }

    function closeModal() {
      document.getElementById('modal-backdrop').style.display = 'none';
      // Clean up Plotly chart to free memory
      const container = document.getElementById('chart-container');
      if (typeof Plotly !== 'undefined') {
        Plotly.purge(container);
      }
      document.getElementById('chart-section').style.display = 'none';
    }

    function handleBackdropClick(event) {
      if (event.target === document.getElementById('modal-backdrop')) {
        closeModal();
      }
    }

    const REFRESH_SECONDS = 30;
    let secondsLeft = REFRESH_SECONDS;

    function tick() {
      secondsLeft--;
      if (secondsLeft <= 0) {
        secondsLeft = REFRESH_SECONDS;
        load();
      }
      document.getElementById('countdown').textContent = secondsLeft;
    }

    async function refreshNow() {
      secondsLeft = REFRESH_SECONDS;
      document.getElementById('countdown').textContent = secondsLeft;
      await load();
    }

    /* --- Portfolio tab --- */
    async function loadPortfolio() {
      try {
        const data = await fetch('/api/portfolio').then(r => r.json());
        const tbody = document.getElementById('pf-tbody');
        if (!data.rows || data.rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="na" style="text-align:center;">No holdings yet. Add one above.</td></tr>';
          document.getElementById('pf-summary').innerHTML = '';
          return;
        }
        tbody.innerHTML = data.rows.map(r => {
          const hasPrice = r.current_price !== null;
          const amtStr = r.total_amount.toFixed(4);
          const avgStr = '\u20ac ' + fmtPrice(r.avg_buy_price);
          const valStr = hasPrice ? ('\u20ac ' + fmtPrice(r.current_value)) : '<span class="na">N/A</span>';
          const pnlVal = hasPrice ? r.pnl_eur : null;
          const pnlStr = pnlVal !== null
            ? `<span class="${pnlVal >= 0 ? 'up' : 'down'}">\u20ac ${pnlVal >= 0 ? '+' : ''}${fmt(pnlVal)}</span>`
            : '<span class="na">N/A</span>';
          const pctVal = hasPrice ? r.pnl_pct : null;
          const pctStr = pctVal !== null
            ? `<span class="${pctVal >= 0 ? 'up' : 'down'}">${pctVal >= 0 ? '+' : ''}${fmt(pctVal)}%</span>`
            : '<span class="na">N/A</span>';
          const allocStr = r.allocation_pct !== null ? (fmt(r.allocation_pct, 1) + '%') : '<span class="na">N/A</span>';
          return `<tr>
            <td class="symbol">${r.symbol}</td>
            <td>${amtStr}</td>
            <td>${avgStr}</td>
            <td>${valStr}</td>
            <td>${pnlStr}</td>
            <td>${pctStr}</td>
            <td>${allocStr}</td>
            <td><button class="lots-toggle" onclick="toggleLots('${r.symbol}', this)">lots</button></td>
          </tr>`;
        }).join('');

        // Summary footer
        const tv = '\u20ac ' + fmtPrice(data.total_value);
        const tp = data.total_pnl_eur;
        const tpClass = tp >= 0 ? 'up' : 'down';
        const tpStr = `<span class="${tpClass}">\u20ac ${tp >= 0 ? '+' : ''}${fmt(tp)}</span>`;
        const tpPct = data.total_pnl_pct;
        const tpPctStr = `<span class="${tpClass}">${tpPct >= 0 ? '+' : ''}${fmt(tpPct)}%</span>`;
        document.getElementById('pf-summary').innerHTML =
          `Total Value: ${tv} &nbsp;|&nbsp; P&amp;L: ${tpStr} (${tpPctStr})`;
      } catch (err) {
        document.getElementById('pf-tbody').innerHTML =
          `<tr><td colspan="8" class="na" style="text-align:center;">Error loading portfolio.</td></tr>`;
      }
    }

    async function toggleLots(symbol, button) {
      const row = button.closest('tr');
      // If lots rows already shown, remove them
      const existing = row.parentNode.querySelectorAll(`.lots-row-${symbol}`);
      if (existing.length > 0) {
        existing.forEach(el => el.remove());
        return;
      }
      try {
        const lots = await fetch('/api/portfolio/lots/' + symbol).then(r => r.json());
        const html = lots.map(l =>
          `<tr class="lots-row lots-row-${symbol}">
            <td></td>
            <td>${l.amount.toFixed(4)}</td>
            <td>\u20ac ${fmtPrice(l.buy_price)}</td>
            <td>${l.buy_date}</td>
            <td></td><td></td><td></td>
            <td class="lot-actions"><button onclick="deleteLot(${l.id})">delete</button></td>
          </tr>`
        ).join('');
        row.insertAdjacentHTML('afterend', html);
      } catch (err) {
        // silently fail
      }
    }

    async function deleteLot(id) {
      if (!confirm('Delete lot #' + id + '?')) return;
      await fetch('/api/portfolio/' + id, {method: 'DELETE'});
      loadPortfolio();
    }

    async function addHolding(event) {
      event.preventDefault();
      const msgEl = document.getElementById('pf-msg');
      const sym = document.getElementById('pf-symbol').value.trim();
      const amt = parseFloat(document.getElementById('pf-amount').value);
      const price = parseFloat(document.getElementById('pf-price').value);
      const dateVal = document.getElementById('pf-date').value || null;
      try {
        const resp = await fetch('/api/portfolio', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({symbol: sym, amount: amt, buy_price: price, buy_date: dateVal}),
        });
        if (!resp.ok) {
          const err = await resp.json();
          msgEl.className = 'form-msg err';
          msgEl.textContent = err.detail || 'Error adding holding';
          return;
        }
        msgEl.className = 'form-msg ok';
        msgEl.textContent = 'Added ' + sym.toUpperCase();
        document.getElementById('pf-symbol').value = '';
        document.getElementById('pf-amount').value = '';
        document.getElementById('pf-price').value = '';
        document.getElementById('pf-date').value = '';
        loadPortfolio();
      } catch (err) {
        msgEl.className = 'form-msg err';
        msgEl.textContent = 'Network error';
      }
    }

    /* --- Toast notification --- */
    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      container.appendChild(toast);
      // Trigger reflow for CSS transition
      toast.offsetHeight;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
        toast.addEventListener('transitionend', () => toast.remove());
      }, 10000);
    }

    /* --- Alert coin dropdown --- */
    function populateAlertDropdown(coins) {
      const select = document.getElementById('alert-symbol');
      // Keep first "Select..." option, remove rest
      while (select.options.length > 1) select.remove(1);
      coins.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.symbol;
        opt.textContent = c.symbol + ' - ' + c.name;
        select.appendChild(opt);
      });
    }

    /* --- Alerts tab --- */
    async function loadAlerts() {
      try {
        const alerts = await fetch('/api/alerts').then(r => r.json());
        const active = alerts.filter(a => a.status === 'active');
        const triggered = alerts.filter(a => a.status === 'triggered');

        const activeTbody = document.getElementById('alerts-active-tbody');
        if (active.length === 0) {
          activeTbody.innerHTML = '<tr><td colspan="6" class="na" style="text-align:center;">No active alerts</td></tr>';
        } else {
          activeTbody.innerHTML = active.map(a => `
            <tr>
              <td>${a.id}</td>
              <td class="symbol">${a.symbol}</td>
              <td>&euro; ${fmtPrice(a.target_price)}</td>
              <td>${a.direction}</td>
              <td>${a.created_at.replace('T', ' ').slice(0, 19)}</td>
              <td><button class="lot-actions" onclick="removeAlert(${a.id})" style="background:none;border:none;color:#f85149;cursor:pointer;font-family:monospace;font-size:0.8em;">remove</button></td>
            </tr>`).join('');
        }

        const triggeredTbody = document.getElementById('alerts-triggered-tbody');
        if (triggered.length === 0) {
          triggeredTbody.innerHTML = '<tr><td colspan="6" class="na" style="text-align:center;">No triggered alerts</td></tr>';
          document.getElementById('clear-triggered-btn').style.display = 'none';
        } else {
          triggeredTbody.innerHTML = triggered.map(a => `
            <tr>
              <td>${a.id}</td>
              <td class="symbol">${a.symbol}</td>
              <td>&euro; ${fmtPrice(a.target_price)}</td>
              <td>${a.direction}</td>
              <td>${(a.triggered_at || '').replace('T', ' ').slice(0, 19)}</td>
              <td><button class="lot-actions" onclick="removeAlert(${a.id})" style="background:none;border:none;color:#f85149;cursor:pointer;font-family:monospace;font-size:0.8em;">remove</button></td>
            </tr>`).join('');
          document.getElementById('clear-triggered-btn').style.display = '';
        }
      } catch (err) {
        document.getElementById('alerts-active-tbody').innerHTML =
          '<tr><td colspan="6" class="na" style="text-align:center;">Error loading alerts</td></tr>';
      }
    }

    async function addAlert(event) {
      event.preventDefault();
      const msgEl = document.getElementById('alert-msg');
      const sym = document.getElementById('alert-symbol').value;
      const price = parseFloat(document.getElementById('alert-price').value);
      const dir = document.getElementById('alert-direction').value;
      if (!sym) { msgEl.className = 'form-msg err'; msgEl.textContent = 'Select a coin'; return; }
      try {
        const resp = await fetch('/api/alerts', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({symbol: sym, target_price: price, direction: dir}),
        });
        if (!resp.ok) {
          const err = await resp.json();
          msgEl.className = 'form-msg err';
          msgEl.textContent = err.detail || 'Error adding alert';
          return;
        }
        msgEl.className = 'form-msg ok';
        msgEl.textContent = 'Alert added for ' + sym;
        document.getElementById('alert-price').value = '';
        loadAlerts();
      } catch (err) {
        msgEl.className = 'form-msg err';
        msgEl.textContent = 'Network error';
      }
    }

    async function removeAlert(id) {
      await fetch('/api/alerts/' + id, {method: 'DELETE'});
      loadAlerts();
    }

    async function clearTriggered() {
      await fetch('/api/alerts/triggered', {method: 'DELETE'});
      loadAlerts();
    }

    /* --- Set Alert from modal --- */
    function setAlertFromModal() {
      const symbol = document.getElementById('modal-symbol').textContent;
      closeModal();
      switchTab('alerts');
      // Pre-fill the symbol dropdown
      const select = document.getElementById('alert-symbol');
      for (let i = 0; i < select.options.length; i++) {
        if (select.options[i].value === symbol) {
          select.selectedIndex = i;
          break;
        }
      }
      document.getElementById('alert-price').focus();
    }

    /* --- Chart in modal --- */
    let currentChartSymbol = '';

    async function loadChart(symbol, interval, limit) {
      currentChartSymbol = symbol;
      const chartSection = document.getElementById('chart-section');
      const container = document.getElementById('chart-container');

      try {
        const resp = await fetch(`/api/candles/${symbol}?interval=${interval}&limit=${limit}`);
        if (!resp.ok) {
          chartSection.style.display = 'none';
          return;
        }
        const candles = await resp.json();
        if (candles.length === 0) {
          chartSection.style.display = 'none';
          return;
        }

        chartSection.style.display = '';

        const trace = {
          x: candles.map(c => new Date(c.timestamp)),
          y: candles.map(c => c.close),
          type: 'scatter',
          mode: 'lines',
          line: { color: '#58a6ff', width: 2 },
          hovertemplate: '%{x|%b %d, %H:%M}<br>\u20ac %{y:,.2f}<extra></extra>'
        };

        const layout = {
          paper_bgcolor: '#161b22',
          plot_bgcolor: '#161b22',
          font: { color: '#c9d1d9', family: 'monospace' },
          xaxis: {
            gridcolor: '#21262d',
            tickformat: interval === '1d' ? '%b %d' : '%b %d %H:%M'
          },
          yaxis: {
            gridcolor: '#21262d',
            tickprefix: '\u20ac ',
            tickformat: ',.2f'
          },
          margin: { t: 10, r: 20, b: 40, l: 70 },
          height: 250
        };

        const config = { responsive: true, displayModeBar: false };
        Plotly.newPlot(container, [trace], layout, config);
      } catch (err) {
        chartSection.style.display = 'none';
      }
    }

    function switchPeriod(period) {
      // Update button states
      document.querySelectorAll('.chart-period-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = period === '7d'
        ? document.querySelector('.chart-period-btn:first-child')
        : document.querySelector('.chart-period-btn:last-child');
      if (activeBtn) activeBtn.classList.add('active');

      // Load chart with appropriate interval and limit
      if (period === '7d') {
        loadChart(currentChartSymbol, '4h', 42);
      } else {
        loadChart(currentChartSymbol, '1d', 30);
      }
    }

    // Initial load + start 1-second countdown tick
    load();
    setInterval(tick, 1000);
  </script>
</body>
</html>
